name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── 1. Format & Lint ────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── 2. Auto-format ENGINES.md links ─────────────────────────
  format-engines-md:
    name: Format ENGINES.md
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: $ secrets.GITHUB_TOKEN 
      - name: Sort and deduplicate ENGINES.md links
        run: |
          if [ -f ENGINES.md ]; then
            # Extract lines that look like markdown links, sort them,
            # remove duplicates, and write back
            python3 -c "
import re, sys
with open('ENGINES.md', 'r') as f:
    content = f.read()
lines = content.split('\n')
header = []
body = []
in_header = True
for line in lines:
    if in_header and (line.startswith('#') or line.strip() == '' or line.startswith('>') or line.startswith('<!--')):
        header.append(line)
    else:
        in_header = False
        body.append(line)
# Sort non-empty body lines, preserve empty lines as separators
sorted_body = sorted([l for l in body if l.strip()], key=lambda x: x.lower())
result = '\n'.join(header + [''] + sorted_body + [''])
with open('ENGINES.md', 'w') as f:
    f.write(result)
"
            echo 'ENGINES.md formatted'
          fi
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ENGINES.md
          git diff --cached --quiet || git commit -m "ci: auto-format ENGINES.md"
          git push || true

  # ── 3. Build ────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets

  # ── 4. Tests ────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # ── 5. Engine smoke tests ───────────────────────────────────
  engine-smoke-test:
    name: Engine Smoke Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run engine registry test
        run: cargo test --package metasearch-engine -- --nocapture
      - name: Verify all engines register
        run: |
          cargo test --package metasearch-engine test_all_engines_register -- --nocapture
