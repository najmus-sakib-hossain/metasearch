name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  format-engines-md:
    name: Format ENGINES.md
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Sort ENGINES.md entries
        run: |
          if [ -f ENGINES.md ]; then
            head_end=$(grep -n '^[-*]' ENGINES.md | head -1 | cut -d: -f1)
            if [ -n "$head_end" ]; then
              head_end=$((head_end - 1))
              head -n "$head_end" ENGINES.md > /tmp/engines_header.md
              tail -n +"$((head_end + 1))" ENGINES.md | sort -f -u > /tmp/engines_body.md
              cat /tmp/engines_header.md /tmp/engines_body.md > ENGINES.md
            fi
            echo "ENGINES.md formatted"
          fi
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ENGINES.md
          git diff --cached --quiet || git commit -m "ci: auto-format ENGINES.md"
          git push || true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  engine-smoke-test:
    name: Engine Smoke Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run engine registry test
        run: cargo test --package metasearch-engine -- --nocapture
      - name: Verify all engines register
        run: cargo test --package metasearch-engine test_all_engines_register -- --nocapture
