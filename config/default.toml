# Metasearch — Default Configuration
# Copy this file to config/local.toml and customize.

[server]
host = "0.0.0.0"
port = 8888
base_url = "http://localhost:8888"
secret_key = "change-me-in-production"
image_proxy = true

[search]
safe_search = 1
default_language = "en"
max_page = 10
request_timeout_ms = 10000
max_concurrent_engines = 50

[cache]
enabled = true
ttl_secs = 300
max_entries = 10000

[rate_limit]
enabled = true
requests_per_second = 10
burst_size = 30
